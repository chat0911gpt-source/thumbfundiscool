name: Update fund data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0,5,12 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch BlackRock Taiwan fund data
        run: python scripts/update_data.py --output data --mode all

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update BlackRock fund data"
            git push
          fi
